<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>예약 관리자 (공연장 수령)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <!-- Supabase 연동: 아래 두 스크립트로 세린캠 DB에 연결합니다 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="serincam-config.js"></script>
    <style>
        :root {
            --primary: #3B82F6; 
            --bg-color: #F8FAFC; 
            --card-bg: #FFFFFF;
            --text-main: #0F172A; 
            --text-sub: #64748B;  
            --border: #E2E8F0;    
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent; 
            letter-spacing: -0.02em; 
            overflow-x: hidden;
            width: 100%;
        }

        body.modal-open { overflow: hidden; height: 100vh; position: fixed; width: 100%; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px; 
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .card:active { background-color: #F1F5F9; border-color: #CBD5E1; transform: scale(0.97); }

        .status-badge { display: inline-flex; align-items: center; justify-content: center; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; line-height: 1; height: 20px; border: 1px solid transparent; }
        .status-wait { background-color: #F0F9FF; color: #0284C7; border-color: #BAE6FD; }
        .status-confirm { background-color: #ECFDF5; color: #059669; border-color: #A7F3D0; }
        .status-return { background-color: #F8FAFC; color: #475569; border-color: #E2E8F0; }
        .status-cancel { background-color: #FEF2F2; color: #DC2626; border-color: #FECACA; }

        .header-fixed {
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        #modal-root { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200; display: none; justify-content: flex-end; flex-direction: column; align-items: center; }
        #modal-root.active { display: flex; }
        
        .modal-overlay { position: absolute; inset: 0; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); }

        .bottom-sheet {
            position: relative; width: 100%; max-width: 28rem; background-color: #FFFFFF;
            border-top-left-radius: 28px; border-top-right-radius: 28px; 
            height: auto; max-height: 90vh;
            display: flex; flex-direction: column; transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 210;
        }
        #modal-root.active .bottom-sheet { transform: translateY(0); }

        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }

        .form-section { background-color: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
        .form-title { font-size: 13px; font-weight: 800; color: #1E293B; margin-bottom: 10px; display: flex; align-items: center; }
        .form-title::before { content: ''; width: 3px; height: 12px; background: var(--primary); margin-right: 8px; border-radius: 2px; }
        .input-label { display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 4px; margin-left: 2px; }
        .input-field { width: 100%; padding: 10px; background: white; border: 1px solid #E2E8F0; border-radius: 10px; font-size: 14px; font-weight: 600; outline: none; }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }

        .status-btn { border: 1px solid #E2E8F0; background: white; font-size: 12px; font-weight: 600; color: #64748B; padding: 10px 0; border-radius: 10px; transition: all 0.2s; }
        .status-btn.active-wait { background: #F0F9FF; border-color: #7DD3FC; color: #0284C7; font-weight: 800; }
        .status-btn.active-confirm { background: #ECFDF5; border-color: #6EE7B7; color: #059669; font-weight: 800; }
        .status-btn.active-return { background: #F8FAFC; border-color: #94A3B8; color: #334155; font-weight: 800; }
        .status-btn.active-cancel { background: #FEF2F2; border-color: #FCA5A5; color: #DC2626; font-weight: 800; }

        .chip-btn { 
            border: 1px solid var(--border); 
            background: white; 
            color: var(--text-sub); 
            transition: all 0.1s; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 700; 
            padding: 6px 12px; 
            white-space: nowrap; 
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 34px;
        }
        .chip-btn.active { background: #1E293B; color: white; border-color: #1E293B; }
        .venue-active-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .model-select-chip {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #E2E8F0;
            background: white;
            color: #64748B;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .model-select-chip.active {
            background: #1E293B;
            color: white;
            border-color: #1E293B;
        }

        .sort-btn { 
            border: 1px solid var(--border); 
            background: white; 
            color: var(--text-sub); 
            transition: all 0.1s; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 700; 
            padding: 8px 12px; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .sort-btn.active { background: #1E293B; color: white; border-color: #1E293B; }
        
        .header-input-box { height: 44px; display: flex; align-items: center; background: white; border: 1px solid #E2E8F0; border-radius: 14px; transition: all 0.2s; }
        .header-input-box:active { background: #F8FAFC; transform: scale(0.98); }

        /* 캘린더 스타일 */
        #calendar-modal-root { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 300; display: none; justify-content: flex-end; flex-direction: column; align-items: center; }
        #calendar-modal-root.active { display: flex; }
        .calendar-sheet {
            position: relative; width: 100%; max-width: 28rem; background-color: #FFFFFF;
            border-top-left-radius: 28px; border-top-right-radius: 28px; padding-bottom: env(safe-area-inset-bottom);
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 310;
        }
        #calendar-modal-root.active .calendar-sheet { transform: translateY(0); }
        .cal-day-cell { height: 44px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; border-radius: 12px; transition: all 0.1s; }
        .cal-day-cell:active { background-color: #F1F5F9; }
        .cal-day-today { color: var(--primary); font-weight: 800; position: relative; }
        .cal-day-today::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }
        .cal-day-selected { background-color: var(--primary) !important; color: white !important; font-weight: 800; }
        .cal-day-selected::after { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative pb-safe">

    <!-- 1. 헤더 영역 -->
    <header class="sticky top-0 z-30 header-fixed pt-safe bg-white/95">
        <div class="px-4 pt-4 pb-3">
            <!-- [ROW 1] 검색바 / 새로고침 -->
            <div class="flex items-center gap-2 mb-3">
                <div class="flex-1 relative h-[44px] bg-slate-50 border border-slate-200 rounded-xl flex items-center px-3 transition-all focus-within:bg-white focus-within:border-blue-400 shadow-sm">
                    <svg class="text-slate-400 mr-2 shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search-input" onkeyup="filterData()" placeholder="이름/번호/일정명/주소/수령" class="w-full bg-transparent border-none text-[13px] font-bold text-slate-900 placeholder-slate-400 outline-none p-0 h-full">
                </div>

                <button onclick="fetchData()" class="w-[44px] h-[44px] flex items-center justify-center bg-slate-50 rounded-xl text-slate-600 active:bg-slate-200 transition-all border border-slate-200 shadow-sm shrink-0">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                </button>
            </div>

            <!-- 날짜 선택 바 (숨겨짐) -->
            <input type="date" id="filter-date" class="hidden">
            
            <!-- 날짜 선택 표시 바 (선택 시 노출) -->
            <div id="active-date-bar" class="hidden mb-3 px-3 py-2 bg-blue-50 border border-blue-100 rounded-xl flex justify-between items-center animate-slide-up-sm">
                <div onclick="openCalendar()" class="flex items-center gap-1.5 text-blue-600 text-xs font-bold cursor-pointer flex-1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span id="active-date-text"></span>
                </div>
                <button onclick="clearDate(event)" class="text-blue-400 hover:text-blue-600 font-bold text-[10px] px-2 py-1 bg-white rounded-lg border border-blue-100">초기화</button>
            </div>
            
            <div class="flex flex-col gap-3">
                <!-- [ROW 2] 수령 위치 필터 (스마트 키워드 매핑 적용) -->
                <div id="loc-filters" class="flex gap-1.5 overflow-x-auto hide-scrollbar pb-1">
                    <button onclick="setLocFilter('all')" class="chip-btn loc-filter-item active" data-loc="all">전체</button>
                    <button onclick="setLocFilter('대화역')" class="chip-btn loc-filter-item" data-loc="대화역">대화역</button>
                    <button onclick="setLocFilter('잠실 종합운동장역')" class="chip-btn loc-filter-item" data-loc="잠실 종합운동장역">잠실 종합운동장역</button>
                    <button onclick="setLocFilter('안암역')" class="chip-btn loc-filter-item" data-loc="안암역">안암역</button>
                    <button onclick="setLocFilter('고척')" class="chip-btn loc-filter-item" data-loc="고척">고척</button>
                    <button onclick="setLocFilter('KSPO')" class="chip-btn loc-filter-item" data-loc="KSPO">KSPO</button>
                    <button onclick="setLocFilter('인스파이어')" class="chip-btn loc-filter-item" data-loc="인스파이어">인스파이어</button>
                    <button onclick="setLocFilter('상암')" class="chip-btn loc-filter-item" data-loc="상암">상암</button>
                    <button onclick="setLocFilter('동대입구역')" class="chip-btn loc-filter-item" data-loc="동대입구역">동대입구역</button>
                    <button onclick="setLocFilter('봉은사역')" class="chip-btn loc-filter-item" data-loc="봉은사역">봉은사역</button>
                    <button onclick="setLocFilter('광나루역')" class="chip-btn loc-filter-item" data-loc="광나루역">광나루역</button>
                    <button onclick="setLocFilter('한강진역')" class="chip-btn loc-filter-item" data-loc="한강진역">한강진역</button>
                    <button onclick="setLocFilter('아시아드')" class="chip-btn loc-filter-item" data-loc="아시아드">아시아드</button>
                    <button onclick="setLocFilter('문학경기장')" class="chip-btn loc-filter-item" data-loc="문학경기장">문학경기장</button>
                    <button onclick="setLocFilter('인천대입구역')" class="chip-btn loc-filter-item" data-loc="인천대입구역">인천대입구역</button>
                    <button onclick="setLocFilter('킨텍스역')" class="chip-btn loc-filter-item" data-loc="킨텍스역">킨텍스역</button>
                    <button onclick="setLocFilter('확인필요')" class="chip-btn loc-filter-item bg-orange-50 text-orange-600 border-orange-200" data-loc="확인필요">확인필요</button>
                </div>

                <!-- [ROW 3] 기종 필터 -->
                <div id="model-filters" class="flex gap-1.5 overflow-x-auto hide-scrollbar pb-1">
                    <button onclick="setModelFilter('all')" class="chip-btn model-filter-item active" data-model="all">전체</button>
                    <button onclick="setModelFilter('23U')" class="chip-btn model-filter-item" data-model="23U">23U</button>
                    <button onclick="setModelFilter('24U')" class="chip-btn model-filter-item" data-model="24U">24U</button>
                    <button onclick="setModelFilter('25U')" class="chip-btn model-filter-item" data-model="25U">25U</button>
                    <button onclick="setModelFilter('26U')" class="chip-btn model-filter-item" data-model="26U">26U</button>
                    <button onclick="setModelFilter('17P')" class="chip-btn model-filter-item" data-model="17P">17P</button>
                    <button onclick="setModelFilter('17PM')" class="chip-btn model-filter-item" data-model="17PM">17PM</button>
                    <button onclick="setModelFilter('배터리')" class="chip-btn model-filter-item" data-model="배터리">⚡배터리</button>
                    <button onclick="setModelFilter('백업')" class="chip-btn model-filter-item" data-model="백업">백업</button>
                    <button onclick="setModelFilter('연장')" class="chip-btn model-filter-item" data-model="연장">연장</button>
                </div>

                <!-- [ROW 4] 공연장 모드 필터 -->
                <div id="venue-filters" class="flex gap-1.5 w-full">
                    <button id="btn-venue-rem" onclick="setVenueFilter('venue_remaining')" class="chip-btn venue-active-btn active flex-1 text-[12px]" data-val="venue_remaining">남은 인원 0</button>
                    <button id="btn-venue-pick" onclick="setVenueFilter('venue_pickedup')" class="chip-btn venue-active-btn flex-1 text-[12px]" data-val="venue_pickedup">수령 인원 0</button>
                    <button onclick="openCalendar()" class="sort-btn flex-1 text-[12px]" id="btn-venue-date">
                        <span class="mr-1">📅</span> 날짜
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 2. 리스트 영역 -->
    <main id="main-content" class="px-4 py-3 pb-32">
        <div id="loading" class="flex flex-col items-center justify-center py-24">
            <div class="w-9 h-9 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin mb-4"></div>
            <p class="text-[13px] font-bold text-slate-400">목록을 불러오는 중...</p>
        </div>
        <div id="list-container" class="space-y-3"></div>
    </main>

    <!-- 3. 상세 정보 모달 -->
    <div id="modal-root">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="bottom-sheet">
            <div class="px-6 py-4 border-b border-slate-200 flex-none bg-white rounded-t-[28px] flex justify-between items-center shadow-sm">
                <h2 class="text-[18px] font-black text-slate-900 tracking-tight">예약 상세 내용</h2>
                <button type="button" onclick="closeModal()" class="p-2 bg-slate-100 rounded-full text-slate-500 active:scale-90">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="scroll-area bg-[#F9FAFB]">
                <form id="edit-form" onsubmit="submitUpdate(event)">
                    <input type="hidden" id="edit-row">
                    <input type="hidden" id="edit-tracking">
                    <input type="hidden" id="edit-start">
                    <input type="hidden" id="edit-end">
                    <input type="hidden" id="edit-delivery">
                    <input type="hidden" id="edit-return-way">
                    
                    <div class="form-section shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <div class="form-title !mb-0">고객 기본 정보</div>
                            <span id="display-order-time" class="text-[11px] font-bold text-slate-400 font-mono">접수: -</span>
                        </div>
                        <div class="grid grid-cols-12 gap-3">
                            <div class="col-span-4 input-group"><label class="input-label">이름</label><input type="text" id="edit-name" class="input-field"></div>
                            <div class="col-span-8 input-group">
                                <label class="input-label">연락처</label>
                                <div class="flex gap-2">
                                    <input type="text" id="edit-phone" class="input-field font-mono">
                                    <a id="btn-call" href="#" class="w-[42px] flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl border border-blue-100 active:bg-blue-100">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section shadow-sm" style="margin-bottom: 0;">
                        <div class="form-title">상태 및 기기 관리</div>
                        <div class="space-y-4">
                            <div>
                                <label class="input-label">대여 모델 (예약한 기종)</label>
                                <div class="flex gap-1.5 overflow-x-auto hide-scrollbar pb-1" id="edit-model-list">
                                    <button type="button" onclick="selectEditModel('23U')" class="model-select-chip" data-val="23U">23U</button>
                                    <button type="button" onclick="selectEditModel('24U')" class="model-select-chip" data-val="24U">24U</button>
                                    <button type="button" onclick="selectEditModel('25U')" class="model-select-chip" data-val="25U">25U</button>
                                    <button type="button" onclick="selectEditModel('26U')" class="model-select-chip" data-val="26U">26U</button>
                                    <button type="button" onclick="selectEditModel('17P')" class="model-select-chip" data-val="17P">17P</button>
                                    <button type="button" onclick="selectEditModel('17PM')" class="model-select-chip" data-val="17PM">17PM</button>
                                    <button type="button" onclick="selectEditModel('백업')" class="model-select-chip" data-val="백업">백업</button>
                                    <button type="button" onclick="selectEditModel('기타')" class="model-select-chip" data-val="기타">기타</button>
                                </div>
                                <input type="hidden" id="edit-model-type">
                            </div>

                            <div class="flex gap-3">
                                <div class="flex-[2]">
                                    <label class="input-label">배정 기기 번호 (직접 입력)</label>
                                    <input type="text" id="edit-device-id" placeholder="예: 12" class="input-field">
                                </div>
                                <div class="flex-1">
                                    <label class="input-label">옵션</label>
                                    <label class="checkbox-wrapper cursor-pointer block h-[42px]">
                                        <input type="checkbox" id="edit-battery" class="hidden">
                                        <div id="battery-box" class="w-full h-full border border-slate-200 rounded-xl flex flex-col items-center justify-center bg-white transition-all">
                                            <span class="text-sm">⚡</span><span class="text-[10px] font-bold text-slate-600">배터리</span>
                                        </div>
                                    </label>
                                </div>
                            </div>
                            <div><label class="input-label">메모</label><textarea id="edit-memo" rows="2" placeholder="메모 입력" class="input-field resize-none"></textarea></div>
                            
                            <div>
                                <label class="input-label">진행 상태</label>
                                <input type="hidden" id="edit-status-val">
                                <div class="grid grid-cols-4 gap-1.5">
                                    <button type="button" onclick="setEditStatus('예약신청')" id="btn-status-wait" class="status-btn">신청</button>
                                    <button type="button" onclick="setEditStatus('확정')" id="btn-status-confirm" class="status-btn">확정</button>
                                    <button type="button" onclick="setEditStatus('반납완료')" id="btn-status-return" class="status-btn">반납</button>
                                    <button type="button" onclick="setEditStatus('취소')" id="btn-status-cancel" class="status-btn">취소</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="p-5 bg-white border-t border-slate-100 flex gap-3 pb-10">
                <button type="button" onclick="confirmDelete()" class="w-1/4 bg-red-50 text-red-600 border border-red-100 font-bold py-3.5 rounded-2xl text-[13px] active:scale-95">삭제</button>
                <button type="button" onclick="submitUpdate()" id="save-btn" class="w-3/4 bg-blue-600 text-white font-bold py-3.5 rounded-2xl text-[15px] shadow-lg shadow-blue-100 active:scale-95">수정 완료하기</button>
            </div>
        </div>
    </div>

    <!-- 캘린더 모달 -->
    <div id="calendar-modal-root">
        <div class="modal-overlay" onclick="closeCalendar()"></div>
        <div class="calendar-sheet">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800">수령일 선택</h2>
                <button onclick="closeCalendar()" class="p-2 -mr-2 text-slate-400"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="p-5">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="moveMonth(-1)" class="p-2 text-slate-500 active:bg-slate-100 rounded-full"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
                    <div id="cal-month-title" class="text-xl font-black text-slate-900"></div>
                    <button onclick="moveMonth(1)" class="p-2 text-slate-500 active:bg-slate-100 rounded-full"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
                </div>
                <div class="grid grid-cols-7 text-center mb-3">
                    <div class="text-[11px] font-bold text-red-400">일</div>
                    <div class="text-[11px] font-bold text-slate-400">월</div>
                    <div class="text-[11px] font-bold text-slate-400">화</div>
                    <div class="text-[11px] font-bold text-slate-400">수</div>
                    <div class="text-[11px] font-bold text-slate-400">목</div>
                    <div class="text-[11px] font-bold text-slate-400">금</div>
                    <div class="text-[11px] font-bold text-blue-400">토</div>
                </div>
                <div id="cal-grid" class="grid grid-cols-7 gap-y-1"></div>
            </div>
        </div>
    </div>

    <!-- 알림 모달 -->
    <div id="alert-modal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center px-8">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]" onclick="closeAlert()"></div>
        <div class="bg-white w-full max-w-[300px] rounded-3xl p-6 relative z-10 shadow-2xl border border-slate-100 text-center">
            <div id="alert-icon" class="text-3xl mb-3">🔔</div>
            <h3 id="alert-title" class="text-lg font-bold text-slate-800 mb-1">알림</h3>
            <p id="alert-msg" class="text-sm text-slate-600 mb-6 break-keep leading-relaxed"></p>
            <div id="alert-actions" class="flex flex-col gap-2"></div>
        </div>
    </div>

    <script>
        // Supabase 클라이언트 초기화 (serincam-config.js의 값 사용)
        const supabaseClient = window.supabase.createClient(
            window.SERINCAM_CONFIG.SUPABASE_URL,
            window.SERINCAM_CONFIG.SUPABASE_ANON_KEY
        );
        const RESERVATIONS_TABLE = 'reservations';

        const MODEL_LIST = ['23U', '24U', '25U', '26U', '17P', '17PM', '백업', '연장'];
        
        // 수령 위치(주소/공연장) 다중 키워드 매핑
        const LOC_MAP = {
            '대화역': ['대화', '고양'],
            '잠실 종합운동장역': ['종합운동장', '잠실', '실내체육관'],
            '안암역': ['안암', '고려대', '화정'],
            '고척': ['고척'],
            'KSPO': ['KSPO', '올림픽', '체조', '티켓링크','핸드볼' ],
            '인스파이어': ['인스파이어'],
            '상암': ['상암', '월드컵'],
            '동대입구역': ['장충'],
            '봉은사역': ['코엑스'],
            '광나루역': ['예스24'],
            '한강진역': ['블루스퀘어'],
            '아시아드': ['아시아드'],
            '문학경기장': ['문학경기장'],
            '인천대입구역': ['송도컨벤시아'],
            '킨텍스역': ['킨텍스']
        };
        const LOC_LIST = Object.keys(LOC_MAP);
        LOC_LIST.push('확인필요'); // 위치 확인필요 항목 추가

        let allData = [];
        let currentFilter = 'venue_remaining';
        let currentModelFilter = 'all';
        let currentLocFilter = 'all'; 
        const isVenueMode = true;
        let selectedDate = null; 
        let calCurrentDate = new Date(); 

        function getKSTDateObj() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (9 * 3600000));
        }

        function getTodayKST() {
            const kst = getKSTDateObj();
            const y = kst.getFullYear();
            const m = String(kst.getMonth() + 1).padStart(2, '0');
            const d = String(kst.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        window.onload = () => {
            selectedDate = getTodayKST();
            updateActiveDateUI();
            fetchData();
        };

        function updateActiveDateUI() {
            const bar = document.getElementById('active-date-bar');
            if(selectedDate) {
                const [y,m,d] = selectedDate.split('-');
                const displayDate = `${parseInt(m)}월 ${parseInt(d)}일`;
                bar.classList.remove('hidden');
                document.getElementById('active-date-text').innerText = `선택된 날짜: ${displayDate}`;
            } else {
                bar.classList.add('hidden');
            }
        }

        function navHome() {
            document.getElementById('search-input').value = '';
            selectedDate = getTodayKST(); 
            updateActiveDateUI();
            setVenueFilter('venue_remaining');
            setModelFilter('all');
            setLocFilter('all'); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
            filterData();
        }

        async function fetchData() {
            toggleLoading(true);
            try {
                const { data, error } = await supabaseClient
                    .from(RESERVATIONS_TABLE)
                    .select('*, returnWay:returnMethod')
                    .order('id', { ascending: true });
                if (error) throw error;
                allData = data || [];
                filterData();
            } catch(e) { console.error(e); showAlert("연결 실패", "네트워크 오류", "📡"); }
            finally { toggleLoading(false); }
        }

        function toggleLoading(show) {
            const list = document.getElementById('list-container');
            const loader = document.getElementById('loading');
            if(show) { list.innerHTML = ''; loader.classList.remove('hidden'); }
            else { loader.classList.add('hidden'); }
        }

        function setVenueFilter(val) {
            currentFilter = val;
            document.querySelectorAll('.venue-active-btn').forEach(btn => {
                if(btn.dataset.val === val) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            filterData();
        }

        function setModelFilter(model) {
            currentModelFilter = model;
            document.querySelectorAll('.model-filter-item').forEach(btn => {
                if(btn.dataset.model === model) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            filterData();
        }

        // 수령 위치 필터 선택 함수
        function setLocFilter(loc) {
            currentLocFilter = loc;
            document.querySelectorAll('.loc-filter-item').forEach(btn => {
                if(btn.dataset.loc === loc) {
                    btn.classList.add('active');
                    if (loc === '확인필요') {
                        btn.classList.remove('bg-orange-50', 'text-orange-600', 'border-orange-200');
                    }
                } else {
                    btn.classList.remove('active');
                    if (btn.dataset.loc === '확인필요') {
                        btn.classList.add('bg-orange-50', 'text-orange-600', 'border-orange-200');
                    }
                }
            });
            filterData();
        }

        // [CALENDAR]
        function openCalendar() {
            calCurrentDate = selectedDate ? new Date(selectedDate + 'T00:00:00') : getKSTDateObj();
            renderCalendar();
            const root = document.getElementById('calendar-modal-root');
            root.classList.add('active');
            document.body.classList.add('modal-open');
        }
        function closeCalendar() {
            const root = document.getElementById('calendar-modal-root');
            root.classList.remove('active');
            document.body.classList.remove('modal-open');
        }
        function moveMonth(step) {
            calCurrentDate.setMonth(calCurrentDate.getMonth() + step);
            renderCalendar();
        }
        function renderCalendar() {
            const year = calCurrentDate.getFullYear();
            const month = calCurrentDate.getMonth();
            document.getElementById('cal-month-title').innerText = `${year}년 ${month + 1}월`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            const todayStr = getTodayKST(); 
            for(let d=1; d<=lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let classes = "cal-day-cell cursor-pointer";
                if(dateStr === todayStr) classes += " cal-day-today";
                if(dateStr === selectedDate) classes += " cal-day-selected";
                const div = document.createElement('div');
                div.className = classes; div.innerText = d; div.onclick = () => selectDate(dateStr);
                grid.appendChild(div);
            }
        }
        function selectDate(dateStr) {
            selectedDate = dateStr;
            updateActiveDateUI();
            closeCalendar();
            filterData();
        }
        function clearDate(e) {
            if(e) e.stopPropagation();
            selectedDate = null;
            updateActiveDateUI();
            filterData();
        }

        function filterData() {
            const query = document.getElementById('search-input').value.toLowerCase();
            let venueRem = 0, venuePick = 0;

            const baseFiltered = allData.filter(item => {
                const matchQuery = (item.name && item.name.includes(query)) || 
                                   (item.phone && item.phone.includes(query)) ||
                                   (item.model && item.model.includes(query)) ||
                                   (item.delivery && item.delivery.includes(query)) ||
                                   (item.address && item.address.includes(query)) || 
                                   (item.scheduleName && item.scheduleName.includes(query)); 
                
                let matchDate = true;
                if(selectedDate) {
                    if(!item.startDate) matchDate = false;
                    else matchDate = (selectedDate === item.startDate);
                }

                let matchVenue = true;
                const delivery = item.delivery || '';
                if(!delivery.includes('공연') && !delivery.includes('현장')) matchVenue = false;

                return matchQuery && matchDate && matchVenue;
            });

            updateModelButtonCounts(baseFiltered);
            updateLocButtonCounts(baseFiltered);

            const finalFiltered = baseFiltered.filter(item => {
                let rawModel = (item.model || '').trim();
                let hasBattery = rawModel.includes('보조배터리');
                let rawModelNoBat = rawModel.replace(/\s*\+?\s*보조배터리/g, '').trim(); 
                
                let matchModel = false;
                if (currentModelFilter === 'all') {
                    matchModel = true;
                } else if (currentModelFilter === '배터리') {
                    matchModel = hasBattery;
                } else {
                    matchModel = rawModelNoBat.toUpperCase().includes(currentModelFilter);
                }

                // 수령 위치 스마트 매핑 필터 검사
                let matchLoc = true;
                if (currentLocFilter !== 'all') {
                    const targetStr = (item.delivery || '') + ' ' + (item.address || '') + ' ' + (item.scheduleName || '');
                    
                    if (currentLocFilter === '확인필요') {
                        // 모든 지정된 키워드 중 하나라도 매칭되면 '확인필요'에 포함되지 않음
                        let matchedAny = false;
                        Object.values(LOC_MAP).forEach(keywords => {
                            if (keywords.some(kw => targetStr.includes(kw))) {
                                matchedAny = true;
                            }
                        });
                        if (matchedAny) matchLoc = false;
                    } else {
                        const keywords = LOC_MAP[currentLocFilter] || [currentLocFilter];
                        if (!keywords.some(kw => targetStr.includes(kw))) {
                            matchLoc = false;
                        }
                    }
                }
                
                const isAssigned = /\d$/.test(rawModelNoBat);
                if (matchModel && matchLoc) {
                    if(isAssigned) venuePick++; else venueRem++; 
                }

                if(currentFilter === 'venue_remaining' && isAssigned) return false;
                if(currentFilter === 'venue_pickedup' && !isAssigned) return false;
                
                return matchModel && matchLoc;
            });

            finalFiltered.sort((a, b) => {
                 if (!a.orderTime || !b.orderTime) return b.id - a.id;
                 const timeA = new Date(a.orderTime).getTime();
                 const timeB = new Date(b.orderTime).getTime();
                 if(timeA !== timeB) return timeB - timeA;
                 return b.id - a.id; 
            });

            document.getElementById('btn-venue-rem').innerText = `남은 인원 ${venueRem}`;
            document.getElementById('btn-venue-pick').innerText = `수령 인원 ${venuePick}`;

            renderList(finalFiltered); 
        }

        function updateModelButtonCounts(dataset) {
            const counts = { '23U':0, '24U':0, '25U':0, '26U':0, '17P':0, '17PM':0, 'all': dataset.length, 'BACKUP':0, 'EXT':0, 'BATTERY':0 };
            dataset.forEach(item => {
                let model = (item.model || '').toUpperCase();
                if(model.includes('23U')) counts['23U']++;
                else if(model.includes('24U')) counts['24U']++;
                else if(model.includes('25U')) counts['25U']++;
                else if(model.includes('26U')) counts['26U']++;
                else if(model.includes('17P') && !model.includes('17PM')) counts['17P']++; 
                else if(model.includes('17PM')) counts['17PM']++;
                
                if(model.includes('백업')) counts['BACKUP']++;
                if(model.includes('연장')) counts['EXT']++;
                if(model.includes('보조배터리')) counts['BATTERY']++;
            });
            document.querySelector('[data-model="all"]').innerText = `전체(${counts.all})`;
            
            ['23U', '24U', '25U', '26U', '17P', '17PM'].forEach(m => {
                const btn = document.querySelector(`[data-model="${m}"]`);
                if(btn) {
                    btn.innerText = `${m}(${counts[m]})`;
                    if(counts[m] === 0) btn.classList.add('hidden');
                    else btn.classList.remove('hidden');
                }
            });
            const backupBtn = document.querySelector('[data-model="백업"]');
            if(backupBtn) {
                backupBtn.innerText = `백업(${counts['BACKUP']})`;
                if(counts['BACKUP'] === 0) backupBtn.classList.add('hidden');
                else backupBtn.classList.remove('hidden');
            }
            const extBtn = document.querySelector('[data-model="연장"]');
            if(extBtn) {
                extBtn.innerText = `연장(${counts['EXT']})`;
                if(counts['EXT'] === 0) extBtn.classList.add('hidden');
                else extBtn.classList.remove('hidden');
            }
            const batteryBtn = document.querySelector('[data-model="배터리"]');
            if(batteryBtn) {
                batteryBtn.innerText = `⚡배터리(${counts['BATTERY']})`;
                if(counts['BATTERY'] === 0) batteryBtn.classList.add('hidden');
                else batteryBtn.classList.remove('hidden');
            }
        }

        function updateLocButtonCounts(dataset) {
            const counts = { 'all': dataset.length };
            LOC_LIST.forEach(l => counts[l] = 0);
            
            dataset.forEach(item => {
                const targetStr = (item.delivery || '') + ' ' + (item.address || '') + ' ' + (item.scheduleName || '');
                let matchedAny = false;

                Object.keys(LOC_MAP).forEach(locKey => {
                    if (LOC_MAP[locKey].some(kw => targetStr.includes(kw))) {
                        counts[locKey]++;
                        matchedAny = true;
                    }
                });

                if (!matchedAny) {
                    counts['확인필요']++;
                }
            });
            
            const allBtn = document.querySelector('[data-loc="all"]');
            if (allBtn) allBtn.innerText = `전체(${counts.all})`;
            
            LOC_LIST.forEach(l => {
                const btn = document.querySelector(`[data-loc="${l}"]`);
                if(btn) {
                    btn.innerText = `${l}(${counts[l]})`;
                    if(counts[l] === 0) btn.classList.add('hidden');
                    else btn.classList.remove('hidden');
                }
            });
        }

        function renderList(list) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            if(!list || list.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-400 text-xs font-medium">검색된 내역이 없습니다.</div>`;
                return;
            }

            list.forEach(item => {
                // 메모 UI 렌더링 방식 변경: 아이콘 대신 하단에 텍스트 노출
                const memoHtml = item.memo ? `<div class="text-[11px] text-slate-500 mt-1.5 w-full overflow-hidden text-ellipsis whitespace-nowrap"><span class="mr-1 text-[10px]">📝</span>${item.memo.replace(/\n/g, ' ')}</div>` : '';
                
                let displayModel = (item.model || '').replace(/\s*\+?\s*보조배터리/g, '').trim();
                let battery = item.model && item.model.includes('보조배터리') ? '<span class="text-amber-500 text-[10px] ml-0.5 font-bold">⚡</span>' : '';
                
                const isAssigned = /\d$/.test(displayModel);
                const badgeClass = isAssigned 
                    ? "bg-emerald-50 text-emerald-600 border-emerald-200" 
                    : "bg-slate-100 text-slate-600 border-slate-200";

                const start = (item.startDate || '').substring(5).replace('-','.');
                const end = (item.endDate || '').substring(5).replace('-','.');
                const clean = t => (t||'').replace(/수령|반납/g, '').trim();
                const method = `${clean(item.delivery)}➔${clean(item.returnWay)}`;
                const time = formatTime(item.orderTime);
                const lastPhone = item.phone ? item.phone.substring(item.phone.length-4) : '';

                const scheduleHtml = item.scheduleName ? 
                    `<div class="text-[12px] font-bold text-indigo-500 mt-1 mb-1 pl-0.5 truncate flex items-center gap-1">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/></svg> 
                        ${item.scheduleName}
                    </div>` : '';

                const card = document.createElement('div');
                card.className = "card px-5 py-4 relative";
                card.onclick = () => openModal(item);
                
                card.innerHTML = `
                    <div class="absolute top-4 right-5 text-[10px] text-slate-600 font-black tracking-tight">${time}</div>
                    <div class="flex justify-between items-end">
                        <div class="flex-1 min-w-0 pr-2 overflow-hidden">
                            <div class="flex items-center gap-1.5 mb-0.5">
                                <span class="${badgeClass} px-1.5 py-0.5 rounded-[5px] font-extrabold text-[12px] border">${displayModel || '미정'}</span>
                                <span class="text-[16px] font-black text-slate-900 truncate tracking-tight">${item.name}</span>
                                <span class="text-[13px] font-bold text-slate-400 font-mono pt-[1px]">${lastPhone}</span>
                                ${battery}
                            </div>
                            ${scheduleHtml}
                            <div class="flex items-center text-[11px] text-slate-400 font-medium gap-2 pl-0.5 mt-0.5">
                                <span class="tracking-tighter opacity-90">${start}~${end}</span>
                                <span class="w-[1px] h-2.5 bg-slate-200"></span>
                                <span class="truncate text-slate-400 font-medium max-w-[120px]">${method}</span>
                            </div>
                            ${memoHtml}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectEditModel(modelName) {
            document.getElementById('edit-model-type').value = modelName;
            document.querySelectorAll('.model-select-chip').forEach(btn => {
                if(btn.dataset.val === modelName) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function openModal(item) {
            const root = document.getElementById('modal-root');
            document.getElementById('edit-row').value = item.id;
            document.getElementById('display-order-time').innerText = "접수: " + (formatTime(item.orderTime, true) || '-');
            document.getElementById('edit-name').value = item.name || '';
            document.getElementById('edit-phone').value = item.phone || '';
            document.getElementById('edit-start').value = item.startDate || '';
            document.getElementById('edit-end').value = item.endDate || '';
            document.getElementById('edit-delivery').value = item.delivery || '';
            document.getElementById('edit-return-way').value = item.returnWay || '';
            document.getElementById('btn-call').href = `tel:${item.phone}`;
            document.getElementById('edit-tracking').value = item.trackingNumber || '';
            document.getElementById('edit-memo').value = item.memo || '';

            let rawModel = item.model || '';
            const hasBattery = rawModel.includes('보조배터리');
            rawModel = rawModel.replace(/\+?\s*보조배터리/g, '').trim();

            let matchedModel = '기타';
            let deviceId = rawModel;
            
            for (const m of MODEL_LIST) {
                if (rawModel.toUpperCase().includes(m)) {
                    matchedModel = m;
                    deviceId = rawModel.replace(m, '').trim(); 
                    break;
                }
            }

            selectEditModel(matchedModel);
            document.getElementById('edit-device-id').value = deviceId;

            const batteryCheck = document.getElementById('edit-battery');
            batteryCheck.checked = hasBattery;
            updateBatteryStyle(hasBattery);

            setEditStatus(item.status || '예약신청');

            root.style.display = 'flex';
            setTimeout(() => root.classList.add('active'), 10);
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            const root = document.getElementById('modal-root');
            root.classList.remove('active');
            setTimeout(() => {
                root.style.display = 'none';
                document.body.classList.remove('modal-open');
            }, 300);
        }

        function setEditStatus(status) {
            document.getElementById('edit-status-val').value = status;
            ['wait','confirm','return','cancel'].forEach(k => {
                document.getElementById(`btn-status-${k}`).className = "status-btn py-3 rounded-lg text-[12px]";
            });
            const map = { '예약신청':'wait', '확정':'confirm', '반납완료':'return', '취소':'cancel' };
            const key = map[status];
            if(key) document.getElementById(`btn-status-${key}`).classList.add(`active-${key}`);
        }

        document.getElementById('edit-battery').onchange = function() { updateBatteryStyle(this.checked); };
        function updateBatteryStyle(checked) {
            const box = document.getElementById('battery-box');
            if(checked) {
                box.className = "w-full h-full border border-blue-500 rounded-xl flex flex-col items-center justify-center bg-blue-50 transition-all";
            } else {
                box.className = "w-full h-full border border-slate-200 rounded-xl flex flex-col items-center justify-center bg-white transition-all";
            }
        }

        async function submitUpdate(e) {
            if(e) e.preventDefault();
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = '반영 중...'; btn.disabled = true;

            const modelType = document.getElementById('edit-model-type').value;
            const deviceId = document.getElementById('edit-device-id').value.trim();
            
            let finalModel = '';
            if (modelType === '기타') {
                finalModel = deviceId; 
            } else {
                finalModel = modelType + deviceId; 
            }
            
            if(document.getElementById('edit-battery').checked) finalModel += "+보조배터리";

            const rowId = document.getElementById('edit-row').value;

            const localPayload = {
                name: document.getElementById('edit-name').value, phone: document.getElementById('edit-phone').value,
                startDate: document.getElementById('edit-start').value, endDate: document.getElementById('edit-end').value,
                delivery: document.getElementById('edit-delivery').value, returnWay: document.getElementById('edit-return-way').value,
                status: document.getElementById('edit-status-val').value, trackingNumber: document.getElementById('edit-tracking').value,
                model: finalModel, memo: document.getElementById('edit-memo').value
            };
            // DB 컬럼명이 returnMethod이므로 저장용 payload는 별도로 구성
            const dbPayload = { ...localPayload, returnMethod: localPayload.returnWay };
            delete dbPayload.returnWay;

            const rowIndex = allData.findIndex(item => item.id == rowId);
            let backupItem = null;
            if(rowIndex !== -1) {
                backupItem = { ...allData[rowIndex] }; 
            }

            if(rowIndex !== -1) {
                allData[rowIndex] = { 
                    ...allData[rowIndex], 
                    ...localPayload
                };
            }

            filterData();
            showAlert("정상적으로 등록 되었어요.", "성공", "✅");
            closeModal();
            btn.innerText = originalText; btn.disabled = false;

            try {
                const { error } = await supabaseClient
                    .from(RESERVATIONS_TABLE)
                    .update(dbPayload)
                    .eq('id', rowId);
                if (error) throw error;
            } catch(err) {
                console.error("서버 저장 실패", err);
                if(backupItem && rowIndex !== -1) {
                    allData[rowIndex] = backupItem; 
                    filterData(); 
                    showAlert("인터넷 연결 등 문제로 서버 저장에 실패했습니다.\n변경 사항이 취소되었습니다.", "저장 실패 ⚠️", "📶");
                }
            }
        }

        function confirmDelete() {
            showConfirm("이 예약을 정말 삭제할까요?", async () => {
                const rowId = document.getElementById('edit-row').value;
                const backupItem = allData.find(item => item.id == rowId);
                
                allData = allData.filter(item => item.id != rowId);
                
                filterData();
                showAlert("예약이 임시 삭제되었습니다.", "완료", "🗑️");
                closeModal();

                try {
                    const { error } = await supabaseClient
                        .from(RESERVATIONS_TABLE)
                        .update({ status: '취소' })
                        .eq('id', rowId);
                    if (error) throw error;
                } catch(err) {
                    console.error("삭제 실패", err);
                    if (backupItem) {
                        allData.push(backupItem); 
                        filterData(); 
                        showAlert("인터넷 연결 등 문제로 서버 삭제에 실패했습니다.\n삭제가 취소되었습니다.", "삭제 실패 ⚠️", "📶");
                    }
                }
            });
        }

        function formatTime(str, full = false) {
            if(!str) return '';
            const d = new Date(str);
            if(isNaN(d)) return str;
            const m = d.getMonth()+1, da = d.getDate(), h = d.getHours(), mi = String(d.getMinutes()).padStart(2,'0');
            return full ? `${d.getFullYear()}.${m}.${da} ${h}:${mi}` : `${m}.${da} ${h}:${mi}`;
        }

        function showAlert(msg, title, icon) {
            openAlertModal(title, msg, icon, `<button onclick="closeAlert()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl text-[14px]">확인</button>`);
        }
        function showConfirm(msg, action) {
            openAlertModal("확인", msg, "🤔", `
                <button id="confirm-yes" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl text-[14px] mb-2">삭제하기</button>
                <button onclick="closeAlert()" class="w-full bg-white text-slate-500 border border-slate-200 font-bold py-4 rounded-2xl text-[14px]">취소</button>
            `);
            document.getElementById('confirm-yes').onclick = () => { closeAlert(); action(); };
        }
        function openAlertModal(title, msg, icon, btns) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-icon').innerText = icon;
            document.getElementById('alert-actions').innerHTML = btns;
            document.getElementById('alert-modal').classList.remove('hidden');
        }
        function closeAlert() { document.getElementById('alert-modal').classList.add('hidden'); }
    </script>
</body>
</html>
